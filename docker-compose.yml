version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: nahla_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: couture_root
      MYSQL_DATABASE: couture_reservations
      MYSQL_USER: couture_user
      MYSQL_PASSWORD: couture_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: nahla_phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8080:80"

volumes:
  mysql_data:
